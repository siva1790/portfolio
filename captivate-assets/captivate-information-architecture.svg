<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1335" viewBox="0 0 1600 1335" role="img" aria-labelledby="title desc">
  <title id="title">Captivate application information architecture and omnichannel interaction map</title>
  <desc id="desc">A layered diagram showing Captivate's actors and channels, global navigation, visit workspace, information hierarchy, service workflow, notifications, and external operational touchpoints.</desc>
  <defs>
    <style>
      .bg{fill:#f7f5f2}.panel{fill:#fff;stroke:#d9ddd9;stroke-width:2}.soft{fill:#eef5f0;stroke:#b9d0c0;stroke-width:2}.dark{fill:#17211b}.green{fill:#167d45}.lime{fill:#c7f05b}.blue{fill:#edf4fc;stroke:#b8cee5;stroke-width:2}.amber{fill:#fff4dc;stroke:#e6c985;stroke-width:2}.purple{fill:#f4effa;stroke:#d5c2e6;stroke-width:2}.label{font:700 14px Arial,sans-serif;letter-spacing:2px;fill:#167d45}.h1{font:700 34px Georgia,serif;fill:#17211b}.h2{font:700 22px Georgia,serif;fill:#17211b}.h3{font:700 17px Arial,sans-serif;fill:#17211b}.actor-title{font:700 15px Arial,sans-serif;fill:#17211b}.actor-body{font:12px Arial,sans-serif;fill:#647067}.body{font:15px Arial,sans-serif;fill:#526058}.small{font:13px Arial,sans-serif;fill:#647067}.white{fill:#fff}.center{text-anchor:middle}.line{fill:none;stroke:#8ea097;stroke-width:2}.flow{fill:none;stroke:#167d45;stroke-width:3}.dash{stroke-dasharray:8 7}.arrow{fill:#167d45}.channel{font:700 14px Arial,sans-serif;fill:#17211b}.pill{fill:#e8f5ed;stroke:#b9d0c0}.status{font:700 12px Arial,sans-serif;fill:#105333}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" class="arrow"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#8ea097"/></marker>
    <marker id="arrowSmall" markerWidth="6" markerHeight="6" refX="5.4" refY="3" orient="auto"><path d="M0 0L6 3L0 6Z" class="arrow"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#17211b" flood-opacity=".08"/></filter>
  </defs>

  <rect width="1600" height="1335" class="bg"/>
  <text x="70" y="64" class="label">CAPTIVATE · INFORMATION ARCHITECTURE</text>
  <text x="70" y="108" class="h1">A shared system for planning, coordinating and confirming client visits</text>
  <text x="70" y="139" class="body">Navigation, data hierarchy and omnichannel interactions across requesters, coordinators and independent service teams.</text>

  <!-- Actors and channels -->
  <rect x="70" y="176" width="1460" height="184" rx="22" class="panel"/>
  <text x="96" y="207" class="label">01 · PEOPLE &amp; CHANNELS</text>

  <g filter="url(#shadow)">
    <rect x="100" y="224" width="230" height="104" rx="16" class="soft"/>
    <circle cx="137" cy="276" r="18" class="green"/><text x="137" y="282" class="h3 white center">R</text>
    <text x="166" y="263" class="actor-title">Requester / organiser</text>
    <text x="166" y="290" class="actor-body">Plans, edits and tracks visits</text>

    <rect x="355" y="224" width="230" height="104" rx="16" class="blue"/>
    <circle cx="392" cy="276" r="18" fill="#2765a8"/><text x="392" y="282" class="h3 white center">C</text>
    <text x="421" y="263" class="actor-title">Coordination team</text>
    <text x="421" y="290" class="actor-body">Triages and assigns ownership</text>

    <rect x="610" y="224" width="230" height="104" rx="16" class="amber"/>
    <circle cx="647" cy="276" r="18" fill="#a86000"/><text x="647" y="282" class="h3 white center">S</text>
    <text x="676" y="263" class="actor-title">Service teams</text>
    <text x="676" y="290" class="actor-body">Review, question and confirm</text>
  </g>

  <path d="M850 276H884" class="line" marker-end="url(#arrowGray)"/>
  <g>
    <rect x="900" y="218" width="120" height="48" rx="24" class="pill"/><text x="960" y="247" class="channel center">Captivate</text>
    <rect x="1035" y="218" width="120" height="48" rx="24" class="panel"/><text x="1095" y="247" class="channel center">Email</text>
    <rect x="1170" y="218" width="145" height="48" rx="24" class="panel"/><text x="1242" y="247" class="channel center">Conversation</text>
    <rect x="1330" y="218" width="165" height="48" rx="24" class="panel"/><text x="1412" y="247" class="channel center">Notifications</text>
    <rect x="900" y="282" width="160" height="48" rx="24" class="panel"/><text x="980" y="311" class="channel center">Spreadsheet import</text>
    <rect x="1075" y="282" width="150" height="48" rx="24" class="panel"/><text x="1150" y="311" class="channel center">Schedule upload</text>
    <rect x="1240" y="282" width="255" height="48" rx="24" class="panel"/><text x="1367" y="311" class="channel center">Backend admin / operations</text>
  </g>

  <!-- Global nav -->
  <rect x="70" y="386" width="1460" height="198" rx="22" class="dark"/>
  <text x="96" y="419" class="label" fill="#c7f05b">02 · GLOBAL NAVIGATION</text>
  <circle cx="126" cy="492" r="31" class="lime"/><text x="126" y="501" class="h2 center">C</text>
  <path d="M168 492H214" stroke="#c7f05b" stroke-width="3" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="230" y="437" width="270" height="110" rx="15" fill="#fff"/>
    <text x="255" y="469" class="h3">My visits</text>
    <text x="255" y="497" class="small">Dashboard · attention · progress</text>
    <text x="255" y="520" class="small">Upcoming · confirmed · history</text>

    <rect x="520" y="437" width="270" height="110" rx="15" fill="#fff"/>
    <text x="545" y="469" class="h3">Plan a visit</text>
    <text x="545" y="497" class="small">Preliminary details · autosave</text>
    <text x="545" y="520" class="small">Locations · broad support needs</text>

    <rect x="810" y="437" width="270" height="110" rx="15" fill="#fff"/>
    <text x="835" y="469" class="h3">Service library</text>
    <text x="835" y="497" class="small">Search · categories · filters</text>
    <text x="835" y="520" class="small">Availability · lead time · add</text>

    <rect x="1100" y="437" width="270" height="110" rx="15" fill="#fff"/>
    <text x="1125" y="469" class="h3">Help</text>
    <text x="1125" y="497" class="small">Task guidance · policies · FAQs</text>
    <text x="1125" y="520" class="small">Contextual support · escalation</text>
  </g>
  <rect x="1392" y="437" width="108" height="110" rx="15" fill="#29322c"/>
  <text x="1446" y="469" class="h3 white center">Utility</text>
  <text x="1446" y="497" class="small white center">Alerts</text>
  <text x="1446" y="520" class="small white center">Profile</text>

  <!-- Workspace -->
  <text x="70" y="626" class="label">03 · SHARED VISIT WORKSPACE</text>
  <rect x="70" y="648" width="1050" height="370" rx="22" class="panel" filter="url(#shadow)"/>
  <rect x="94" y="674" width="1002" height="76" rx="14" class="soft"/>
  <text x="120" y="706" class="h2">Visit context</text>
  <text x="120" y="731" class="small">Client · visit ID · dates · locations · organiser · current status</text>
  <g>
    <rect x="94" y="774" width="182" height="214" rx="15" class="panel"/>
    <text x="115" y="808" class="h3">Overview</text>
    <text x="115" y="838" class="small">Next actions</text><text x="115" y="863" class="small">Information readiness</text>
    <text x="115" y="888" class="small">Service confirmation</text><text x="115" y="913" class="small">Recent activity</text>
    <text x="115" y="938" class="small">Open conversation</text>

    <rect x="294" y="774" width="182" height="214" rx="15" class="panel"/>
    <text x="315" y="808" class="h3">Attendees</text>
    <text x="315" y="838" class="small">Visitors · internal</text><text x="315" y="863" class="small">Hosts · organiser</text>
    <text x="315" y="888" class="small">Session assignment</text><text x="315" y="913" class="small">Access readiness</text>
    <text x="315" y="938" class="small">Import / copy</text>

    <rect x="494" y="774" width="182" height="214" rx="15" class="panel"/>
    <text x="515" y="803" class="h3">Locations &amp;</text>
    <text x="515" y="824" class="h3">sessions</text>
    <text x="515" y="852" class="small">Office · dates</text><text x="515" y="875" class="small">Local coordinator</text>
    <text x="515" y="898" class="small">Itinerary · timing</text><text x="515" y="921" class="small">Room · attendees</text>
    <text x="515" y="944" class="small">Upload schedule</text>

    <rect x="694" y="774" width="182" height="214" rx="15" class="panel"/>
    <text x="715" y="808" class="h3">Services</text>
    <text x="715" y="838" class="small">Session-specific setup</text><text x="715" y="863" class="small">Conditional questions</text>
    <text x="715" y="888" class="small">Quantity · preferences</text><text x="715" y="913" class="small">Owner · lead time</text>
    <text x="715" y="938" class="small">Status · questions</text>

    <rect x="894" y="774" width="202" height="214" rx="15" class="soft"/>
    <text x="915" y="808" class="h3">Review &amp; send</text>
    <text x="915" y="838" class="small">Visit summary</text><text x="915" y="863" class="small">Readiness validation</text>
    <text x="915" y="888" class="small">Location / session roll-up</text><text x="915" y="913" class="small">Route to service teams</text>
    <text x="915" y="938" class="small">Expected response</text>
  </g>

  <!-- Omnichannel -->
  <rect x="1150" y="648" width="380" height="370" rx="22" class="purple"/>
  <text x="1175" y="681" class="label">OMNICHANNEL LOOP</text>
  <g>
    <rect x="1180" y="713" width="320" height="64" rx="13" fill="#fff"/>
    <text x="1200" y="738" class="h3">1. Captivate action</text>
    <text x="1200" y="761" class="small">Submit, edit, answer or confirm</text>
    <path d="M1340 777V792" class="flow" marker-end="url(#arrowSmall)"/>
    <rect x="1180" y="798" width="320" height="64" rx="13" fill="#fff"/>
    <text x="1200" y="823" class="h3">2. Operational routing</text>
    <text x="1200" y="846" class="small">Coordinator / responsible service owner</text>
    <path d="M1340 862V877" class="flow" marker-end="url(#arrowSmall)"/>
    <rect x="1180" y="883" width="320" height="64" rx="13" fill="#fff"/>
    <text x="1200" y="908" class="h3">3. Update across channels</text>
    <text x="1200" y="931" class="small">Workspace + email + notification</text>
    <path d="M1180 915H1157V745H1175" class="flow dash" marker-end="url(#arrowSmall)"/>
    <text x="1180" y="979" class="small">Focused questions remain attached to the visit,</text>
    <text x="1180" y="1000" class="small">session and service that produced them.</text>
  </g>

  <!-- Data model -->
  <text x="70" y="1063" class="label">04 · CORE INFORMATION MODEL &amp; LIFECYCLE</text>
  <g filter="url(#shadow)">
    <rect x="70" y="1088" width="220" height="108" rx="16" class="dark"/>
    <text x="180" y="1130" class="h2 white center">Visit</text>
    <text x="180" y="1165" class="small white center">purpose · sponsor · dates · status</text>
    <path d="M290 1142H333" class="flow" marker-end="url(#arrow)"/>
    <rect x="345" y="1088" width="220" height="108" rx="16" class="soft"/>
    <text x="455" y="1130" class="h2 center">Location</text>
    <text x="455" y="1165" class="small center">office · local owner · date range</text>
    <path d="M565 1142H608" class="flow" marker-end="url(#arrow)"/>
    <rect x="620" y="1088" width="220" height="108" rx="16" class="blue"/>
    <text x="730" y="1130" class="h2 center">Session</text>
    <text x="730" y="1165" class="small center">time · room · people · format</text>
    <path d="M840 1142H883" class="flow" marker-end="url(#arrow)"/>
    <rect x="895" y="1088" width="220" height="108" rx="16" class="amber"/>
    <text x="1005" y="1130" class="h2 center">Service</text>
    <text x="1005" y="1165" class="small center">requirements · owner · confirmation</text>
  </g>

  <path d="M180 1196V1275H1440V1252" class="line dash"/>
  <g>
    <rect x="1160" y="1088" width="175" height="48" rx="24" class="pill"/><text x="1247" y="1117" class="status center">Draft / autosaved</text>
    <rect x="1350" y="1088" width="180" height="48" rx="24" class="pill"/><text x="1440" y="1117" class="status center">Preliminary request</text>
    <rect x="1160" y="1146" width="175" height="48" rx="24" class="pill"/><text x="1247" y="1175" class="status center">Information needed</text>
    <rect x="1350" y="1146" width="180" height="48" rx="24" class="pill"/><text x="1440" y="1175" class="status center">Under review</text>
    <rect x="1160" y="1204" width="175" height="48" rx="24" class="pill"/><text x="1247" y="1233" class="status center">Confirmed</text>
    <rect x="1350" y="1204" width="180" height="48" rx="24" class="pill"/><text x="1440" y="1233" class="status center">Changed / reopened</text>
  </g>
  <text x="70" y="1312" class="small">Design rule: a material change reopens only the affected service; the rest of the visit keeps its existing confirmation state.</text>
</svg>
