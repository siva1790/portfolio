<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0078bc">
  <title>Mobile Travel Insurance Portal</title>
  <style>
    :root {
      --blue: #0078bc;
      --blue-light: #abe3fa;
      --cyan: #48c1e7;
      --orange: #ffab0a;
      --green: #27bf98;
      --ink: #3d3d3d;
      --muted: #7d7d7d;
      --line: #d8d8d8;
      --footer: #f2f2f2;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #e9e9e9; }
    body { font-family: "Arial Narrow", Arial, Helvetica, sans-serif; color: var(--ink); }
    button, input, select, textarea { font: inherit; }
    .phone {
      width: min(100%, 375px);
      min-height: 100vh;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,.12);
    }
    .art-screen { position: relative; width: 100%; line-height: 0; }
    .art-screen img { display: block; width: 100%; height: auto; }
    .hotspot {
      position: absolute;
      z-index: 2;
      display: block;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }
    .hotspot:hover { background: rgba(255,171,10,.08); }
    .hotspot:focus-visible { outline: 3px solid var(--orange); }

    .app-header {
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 9px;
      background: var(--blue);
      color: #fff;
    }
    .menu { margin-right: 12px; font-size: 21px; line-height: 1; }
    .brand-space { flex: 1; }
    .header-icon { margin-left: 15px; font-size: 17px; }
    .page { min-height: calc(100vh - 42px); background: #fff; }
    .breadcrumb { padding: 10px 8px 4px; color: #999; font-size: 7px; }
    .page-title { margin: 14px 8px 12px; color: var(--blue); font-size: 21px; font-weight: 400; }
    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 2px 15px 18px;
    }
    .step { position: relative; text-align: center; color: #999; font-size: 7px; }
    .step::after {
      content: "";
      position: absolute;
      top: 11px;
      left: 64%;
      width: 72%;
      border-top: 1px solid #bbb;
    }
    .step:last-child::after { display: none; }
    .step-num {
      position: relative;
      z-index: 1;
      width: 23px;
      height: 23px;
      display: grid;
      place-items: center;
      margin: 0 auto 5px;
      border: 1px dashed #999;
      border-radius: 50%;
      background: #fff;
      font-size: 11px;
      font-weight: 700;
    }
    .step.done .step-num { border-color: var(--green); background: var(--green); color: #fff; }
    .step.active { color: var(--blue); font-weight: 700; }
    .step.active .step-num { border-color: var(--blue); background: var(--blue); color: #fff; }

    .summary {
      display: grid;
      grid-template-columns: 1.2fr 1fr .85fr;
      gap: 5px;
      padding: 10px 8px;
      background: var(--blue-light);
      font-size: 9px;
    }
    .summary strong { display: block; margin-top: 2px; font-size: 11px; }
    .section { padding: 0 8px 12px; }
    .section-heading {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 17px 0 12px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }
    .section-heading::before {
      content: "⌃";
      width: 14px;
      height: 14px;
      display: grid;
      place-items: center;
      background: var(--blue);
      color: #fff;
      font-size: 10px;
    }
    .grid { display: grid; grid-template-columns: 1fr; gap: 13px; }
    .field { position: relative; }
    .field label {
      position: absolute;
      z-index: 1;
      top: -5px;
      left: 8px;
      padding: 0 3px;
      background: #fff;
      color: #666;
      font-size: 8px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      min-height: 39px;
      padding: 10px 9px 7px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #fff;
      color: #444;
      font-size: 10px;
    }
    .field textarea { min-height: 75px; resize: vertical; }
    .inline-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .switch-row { display: flex; align-items: center; gap: 8px; font-size: 9px; }
    .switch {
      width: 36px;
      height: 19px;
      padding: 2px;
      border: 0;
      border-radius: 14px;
      background: var(--blue);
    }
    .switch::after {
      content: "";
      display: block;
      width: 15px;
      height: 15px;
      margin-left: 17px;
      border-radius: 50%;
      background: #fff;
    }
    .hint { margin: 7px 0 0; color: #777; font-size: 8px; line-height: 1.45; }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 16px 8px 18px;
      border-top: 1px solid var(--line);
    }
    .btn {
      min-height: 37px;
      padding: 8px 16px;
      border: 1px solid var(--orange);
      border-radius: 3px;
      background: #fff;
      color: #666;
      font-size: 10px;
      cursor: pointer;
    }
    .btn-primary { background: var(--orange); color: #fff; font-weight: 700; }
    .footer-plane {
      width: 104px;
      height: auto;
      display: block;
      margin: 8px 7px -2px;
      object-fit: contain;
    }
    .app-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 34px;
      padding: 22px 9px 16px;
      background: var(--footer);
      color: #888;
      font-size: 7px;
    }
    .copyright { grid-column: 1 / -1; line-height: 1.4; }
    .payment-options { display: grid; gap: 12px; }
    .option {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 3px;
      font-size: 10px;
    }
    .radio {
      width: 17px;
      height: 17px;
      border: 1px solid #aaa;
      border-radius: 50%;
    }
    .option.selected .radio { border: 5px solid var(--blue); }
    .review {
      margin: 0 8px 15px;
      padding: 12px;
      border: 4px solid var(--blue-light);
      font-size: 9px;
    }
    .review h3 { margin: 12px 0 8px; font-size: 13px; }
    .review-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .review dt { color: #777; font-size: 7px; }
    .review dd { margin: 2px 0 8px; font-weight: 700; }
    .success {
      padding: 42px 18px 30px;
      text-align: center;
    }
    .success-check {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      margin: 0 auto 15px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-size: 28px;
    }
    .success h2 { margin: 0 0 8px; font-size: 18px; }
    .success p { margin: 0; color: #777; font-size: 10px; }
    .success-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 32px 0;
      text-align: left;
    }
    .stat { padding: 12px; border-top: 1px solid var(--line); }
    .stat small { color: #888; font-size: 7px; }
    .stat strong { display: block; margin-top: 4px; font-size: 12px; }
    .success-actions { display: grid; gap: 8px; }
  </style>
</head>
<body>
  <main class="phone" id="app" aria-live="polite"></main>

  <script>
    const app = document.getElementById("app");

    const footer = `
      <img class="footer-plane" src="mobile-travel-portal-assets/aeroplane.png" alt="">
      <footer class="app-footer">
        <span>Term of Use</span><span>Privacy Principles</span>
        <span>Accessibility</span><span>Fraud Warnings</span>
        <span>Credits</span><span>Diversity</span>
        <span>Connect with Us</span>
        <span class="copyright">© 2018. Insurance portal prototype<br>All Rights Reserved.</span>
      </footer>`;

    const header = `
      <header class="app-header">
        <span class="menu">☰</span>
        <span class="brand-space" aria-hidden="true"></span>
        <span class="header-icon">⌕</span>
        <span class="header-icon">♧<sup>9+</sup></span>
      </header>`;

    function steps(active) {
      const labels = ["GENERATE QUOTE", "TRAVELLER DETAILS", "PAYMENT", "POLICY"];
      return `<div class="steps">${labels.map((label, i) => `
        <div class="step ${i + 1 < active ? "done" : ""} ${i + 1 === active ? "active" : ""}">
          <span class="step-num">${i + 1}</span>${label}
        </div>`).join("")}</div>`;
    }

    function artScreen(src, label, hotspots) {
      app.innerHTML = `<section class="art-screen" aria-label="${label}">
        <img src="${src}" alt="">
        ${hotspots.map(h => `<button class="hotspot" aria-label="${h.label}" data-go="${h.go}"
          style="left:${h.x / h.sourceWidth * 100}%;top:${h.y / h.sourceHeight * 100}%;width:${h.w / h.sourceWidth * 100}%;height:${h.h / h.sourceHeight * 100}%"></button>`).join("")}
      </section>`;
      bind();
    }

    function dashboard() {
      artScreen("mobile-travel-portal-assets/dashboard-clean-v3.png", "Mobile dashboard", [
        { label:"Travel Insurance card", go:"quote", x:9, y:790, w:302, h:222, sourceWidth:320, sourceHeight:2620 }
      ]);
    }

    function quote() {
      artScreen("mobile-travel-portal-assets/generate-quote-clean-v3.png", "Generate quote and select plan", [
        { label:"Save and Next", go:"traveller", x:170, y:2726, w:140, h:48, sourceWidth:320, sourceHeight:3184 },
        { label:"Back to dashboard", go:"dashboard", x:0, y:0, w:50, h:42, sourceWidth:320, sourceHeight:3184 }
      ]);
    }

    function traveller() {
      app.innerHTML = `${header}<section class="page">
        <div class="breadcrumb">Home / Issue Policy / Traveller Details</div>
        <h1 class="page-title">Issue Policy</h1>
        ${steps(2)}
        <div class="summary"><span>Plan<strong>Travel Companion Care</strong></span><span>Total Premium<strong>₹ 2,200</strong></span><span>Travel Duration<strong>10 days</strong></span></div>
        <section class="section">
          <h2 class="section-heading">Proposer: Mr Siva Ramalingam</h2>
          <div class="grid">
            <div class="field"><label>Pin Code *</label><input value="400001"></div>
            <div class="field"><label>Select State *</label><select><option>Maharashtra</option></select></div>
            <div class="field"><label>Select City *</label><select><option>Mumbai</option></select></div>
            <div class="field"><label>Area</label><input value="Colaba"></div>
            <div class="field"><label>House Number *</label><input value="Flat No.2, Atlanta Chambers"></div>
            <div class="field"><label>Mobile Number *</label><input value="9820780123"></div>
            <div class="field"><label>Email</label><input value="abc@ccc.com"></div>
          </div>
          <h2 class="section-heading">Traveller: Mr Rohit Das, 33yrs</h2>
          <div class="grid">
            <div class="field"><label>Gender *</label><select><option>Male</option></select></div>
            <div class="field"><label>Passport Number *</label><input value="H4558762"></div>
            <div class="field"><label>Nominee Name</label><input value="Simran"></div>
            <div class="field"><label>Nominee Relation</label><select><option>Wife</option></select></div>
            <div class="switch-row"><span>Any pre existing disease(s)?</span><span>No</span><button class="switch" aria-label="Pre-existing disease: Yes"></button><span>Yes</span></div>
            <div class="field"><label>Select PED *</label><select><option>Hypertension</option></select></div>
            <div class="field"><label>Date of Diagnosis *</label><input value="20/11/2018"></div>
            <div class="field"><label>Current Medication *</label><input value="Lorem ipsum dummy text"></div>
          </div>
          <h2 class="section-heading">Uncovered Countries/Events</h2>
          <p class="hint">Some countries and events are not covered in this policy. If you plan to travel to any of these countries or events, please select from the lists below:</p>
          <div class="grid" style="margin-top:14px">
            <div class="field"><label>Uncovered Countries</label><select><option>None</option></select></div>
            <div class="field"><label>Uncovered Events</label><select><option>None</option></select></div>
            <div class="field"><label>Remarks</label><textarea>Enter Remarks</textarea></div>
          </div>
        </section>
        <div class="actions"><button class="btn" data-go="quote">Back</button><button class="btn">Save</button><button class="btn btn-primary" data-go="payment">Proceed</button></div>
        ${footer}
      </section>`;
      bind();
    }

    function payment() {
      app.innerHTML = `${header}<section class="page">
        <div class="breadcrumb">Home / Issue Policy / Payment</div>
        <h1 class="page-title">Issue Policy</h1>
        ${steps(3)}
        <div class="summary"><span>Plan<strong>Travel Companion Care</strong></span><span>Total Premium<strong>₹ 2,200</strong></span><span>Travel Duration<strong>10 days</strong></span></div>
        <section class="section">
          <h2 class="section-heading">Mode of Payment</h2>
          <h3 style="font-size:11px;margin:15px 0 8px">BY AGENT</h3>
          <div class="payment-options">
            <div class="option selected"><span class="radio"></span><span>Float<br><small style="color:#f0a000">Available Float: ₹25,00,000</small></span></div>
            <div class="option"><span class="radio"></span><span>Bank Guarantee (BG) Float</span></div>
          </div>
          <h3 style="font-size:11px;margin:20px 0 8px">BY CUSTOMER</h3>
          <div class="payment-options">
            <div class="option"><span class="radio"></span><span>Send payment link to customer</span></div>
            <div class="option"><span class="radio"></span><span>Cheque/DD payment by customer</span></div>
          </div>
          <h2 class="section-heading">Review Application</h2>
        </section>
        <div class="review">
          <div class="review-grid">
            <dl><dt>Geographical Cover</dt><dd>Worldwide including USA/Canada</dd><dt>Additional Covers</dt><dd>Loss of personal belongings, Escort for minor child</dd></dl>
            <dl><dt>Destination Countries</dt><dd>China, North America, Australia</dd><dt>Journey Start Date</dt><dd>13-May-2018</dd><dt>Journey End Date</dt><dd>12-May-2019</dd></dl>
          </div>
          <h3>Proposer’s Details</h3>
          <div class="review-grid"><dl><dt>Name</dt><dd>Rajiv Mahajan</dd><dt>Mobile</dt><dd>9876123443</dd></dl><dl><dt>Date of birth</dt><dd>12-May-1990</dd><dt>Email</dt><dd>rohit@gmail.com</dd></dl></div>
          <h3>Traveller Details</h3>
          <div class="review-grid"><dl><dt>Name</dt><dd>Mr Rajiv Mahajan</dd><dt>Date of birth</dt><dd>22-July-1993</dd></dl><dl><dt>Passport No.</dt><dd>K23453445</dd><dt>Name</dt><dd>Mrs Shivangi Goyal</dd></dl></div>
        </div>
        <div class="actions"><button class="btn" data-go="traveller">Back</button><button class="btn btn-primary" data-go="success">Submit</button></div>
        ${footer}
      </section>`;
      bind();
    }

    function success() {
      app.innerHTML = `${header}<section class="page">
        <div class="breadcrumb">Home / Issue Policy / Policy</div>
        <h1 class="page-title">Issue Policy</h1>
        ${steps(4)}
        <div class="success">
          <div class="success-check">✓</div>
          <h2>Payment Successful !</h2>
          <p>Your Policy <strong>19013434 434</strong> is issued successfully.</p>
          <div class="success-stats">
            <div class="stat"><small>Amount Paid</small><strong>₹4,000</strong></div>
            <div class="stat"><small>Remaining Float Balance</small><strong>₹20,000</strong></div>
            <div class="stat"><small>Date of Payment</small><strong>22-Jun-2018</strong></div>
            <div class="stat"><small>Payment Method</small><strong>Notional Float</strong><small>A/C No. 2113243233</small></div>
          </div>
          <div class="success-actions">
            <button class="btn btn-primary">Download Certificate</button>
            <button class="btn">Share Policy</button>
            <button class="btn" data-go="quote">Issue Another Policy</button>
          </div>
        </div>
        ${footer}
      </section>`;
      bind();
    }

    const routes = { dashboard, quote, traveller, payment, success };
    function show(id, push = true) {
      (routes[id] || dashboard)();
      document.title = `${id[0].toUpperCase() + id.slice(1)} - Mobile Travel Insurance Portal`;
      window.scrollTo({ top: 0, behavior: "auto" });
      if (push && location.hash !== `#${id}`) history.pushState({ id }, "", `#${id}`);
    }
    function bind() {
      document.querySelectorAll("[data-go]").forEach(el => el.addEventListener("click", () => show(el.dataset.go)));
    }
    window.addEventListener("popstate", e => show(e.state?.id || location.hash.slice(1) || "dashboard", false));
    show(routes[location.hash.slice(1)] ? location.hash.slice(1) : "dashboard", false);
  </script>
</body>
</html>
